name: Scrape Real Estate Values

on:
  schedule:
    # Run daily at 9:00 PM UTC (4:00 PM EST)
    # County usually updates Fridays but schedule is unreliable
    # Script checks for new data first and skips if unchanged
    - cron: '0 21 * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.0'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libxml2-dev libssl-dev

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("rvest", "dplyr", "purrr", "stringr", "httr", "tibble", "here", "readr", "lubridate"))'

      - name: Run real estate values scraper
        run: |
          Rscript scrape-real-estate-values.R

      - name: Commit and push if changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/tax-base.csv
          git diff --staged --quiet || git commit -m "Update real estate values - $(date +'%Y-%m-%d')"
          git push
